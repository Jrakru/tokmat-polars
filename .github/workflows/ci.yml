name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::cognitive_complexity
      - name: Run tests
        run: cargo test
      - name: Build docs
        run: cargo doc --no-deps
      - name: Dry-run publish
        run: cargo publish --dry-run

  python-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python build and test tools
        run: python -m pip install --upgrade pip maturin pytest polars
      - name: Build Python wheel
        run: maturin build --release
      - name: Install Python wheel
        run: python -m pip install target/wheels/*.whl
      - name: Run Python plugin integration tests
        run: pytest -q tests/test_python_plugin.py
